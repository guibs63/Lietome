<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Lietome Live 🚀</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    #chat {
      border: 1px solid #ccc;
      height: 400px;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
    }

    #chat div {
      margin-bottom: 5px;
    }

    input, select, button {
      padding: 5px;
      margin-right: 5px;
    }
  </style>
</head>
<body>

  <h1>Lietome Live 🚀</h1>

  <input type="text" id="username" placeholder="Pseudo" />
  
  <select id="project">
    <option value="Ever">Ever</option>
    <option value="Tintin">Tintin</option>
    <option value="Sensi">Sensi</option>
  </select>

  <button onclick="joinProject()">Rejoindre</button>

  <hr>

  <div id="chat"></div>

  <form id="chat-form">
    <input type="text" id="message" placeholder="Message..." autocomplete="off" />
    <button type="submit">Envoyer</button>
  </form>

  <!-- ✅ CDN officiel socket.io -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <script>
    const socket = io();

    let currentProject = null;

    const chat = document.getElementById("chat");
    const form = document.getElementById("chat-form");
    const input = document.getElementById("message");
    const usernameInput = document.getElementById("username");
    const projectSelect = document.getElementById("project");

    function addMessage(username, message) {
      const div = document.createElement("div");
      div.innerHTML = "<strong>" + username + ":</strong> " + message;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function joinProject() {
      const username = usernameInput.value.trim();
      const project = projectSelect.value;

      if (!username) {
        alert("Entre un pseudo");
        return;
      }

      currentProject = project;
      socket.emit("joinProject", { username, project });

      addMessage("SYSTEM", "Connecté au projet " + project);
    }

    form.addEventListener("submit", function (e) {
      e.preventDefault();

      const message = input.value.trim();
      const username = usernameInput.value.trim();

      if (!message || !currentProject) return;

      socket.emit("chatMessage", {
        username,
        message,
        project: currentProject
      });

      input.value = "";
    });

    socket.on("chatMessage", function (data) {
      if (data.project === currentProject) {
        addMessage(data.username, data.message);
      }
    });
  </script>

</body>
</html>

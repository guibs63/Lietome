<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Lietome Live 🚀</title>
  <script src="/socket.io/socket.io.js" defer></script>
</head>
<body>

<h2>Lietome Live 🚀</h2>

<input id="username" placeholder="Pseudo">
<select id="project">
  <option value="Ever">Ever</option>
</select>

<button id="joinBtn">Rejoindre</button>

<hr>

<div id="messages" style="height:300px; overflow:auto; border:1px solid #ccc;"></div>

<input id="message" placeholder="Message..." style="width:60%">
<button id="sendBtn">Envoyer</button>

<!-- Upload -->
<input type="file" id="fileInput" style="display:none">
<button id="uploadBtn">+</button>

<ul id="fileList"></ul>

<script defer>
document.addEventListener("DOMContentLoaded", () => {

  const socket = io();
  let currentProject = null;

  const joinBtn = document.getElementById("joinBtn");
  const sendBtn = document.getElementById("sendBtn");
  const uploadBtn = document.getElementById("uploadBtn");
  const fileInput = document.getElementById("fileInput");

  joinBtn.addEventListener("click", () => {
    currentProject = document.getElementById("project").value;
    socket.emit("joinProject", {
      project: currentProject,
      username: document.getElementById("username").value
    });
  });

  sendBtn.addEventListener("click", () => {
    socket.emit("chatMessage", {
      project: currentProject,
      username: document.getElementById("username").value,
      message: document.getElementById("message").value
    });
    document.getElementById("message").value = "";
  });

  socket.on("chatMessage", (data) => {
    const div = document.createElement("div");
    div.innerHTML = `<b>${data.username}:</b> ${data.message}`;
    document.getElementById("messages").appendChild(div);
  });

  // Upload
  uploadBtn.addEventListener("click", () => {
    fileInput.click();
  });

  fileInput.addEventListener("change", async () => {
    const file = fileInput.files[0];
    if (!file || !currentProject) return;

    const formData = new FormData();
    formData.append("file", file);
    formData.append("project", currentProject);

    await fetch("/upload", {
      method: "POST",
      body: formData
    });

    alert("Fichier ajouté ✅");
  });

  socket.on("fileList", (files) => {
    const ul = document.getElementById("fileList");
    ul.innerHTML = "";
    files.forEach(f => {
      const li = document.createElement("li");
      li.innerHTML = `<a href="/${f.filepath}" target="_blank">${f.filename}</a>`;
      ul.appendChild(li);
    });
  });

});
</script>

</body>
</html>
